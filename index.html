<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MetaScope">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">

    <title>MetaScope</title>

    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<main>
    <header>
        <h1>MetaScope</h1>
        <p class="tagline">LOCAL ONLY</p>
    </header>

    <input
        type="file"
        id="photoPicker"
        accept="image/*"
        multiple
        hidden>

    <button id="pickButton">
        Choisir des photos
    </button>

    <section id="viewer">
        <p id="selectionInfo">
            Aucune photo sélectionnée.
        </p>

        <p id="activePhotoInfo">
            Aucune photo active.
        </p>

        <div class="panel">
            <h3>Fichier</h3>
            <div id="fileInfo"></div>
        </div>

        <div class="panel">
            <h3>EXIF</h3>
            <div id="exifInfo">
                Aucune donnée EXIF.
            </div>
        </div>

        <div class="panel">
            <h3>C2PA</h3>
            <div id="c2paInfo">
                Aucune donnée C2PA.
            </div>
        </div>
    </section>

    <section id="gallery"></section>
</main>

<script src="js/config.js"></script>
<script src="js/lib/exifreader/exif-reader.js"></script>
<script src="js/gallery.js"></script>
<script src="js/exif.js"></script>
<script src="js/c2pa.js"></script>
<script src="js/viewer.js"></script>
<script src="js/app.js"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js");
    });
}
</script>
</body>

</html>
